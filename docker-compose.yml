services:
  mkdocs:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8080:8080"
    volumes:
      - ./mkdocs.yml:/mkdocs/mkdocs.yml:ro
      - ./docs:/mkdocs/docs
      - ./site:/mkdocs/site
    environment:
      - MKDOCS_PORT=8080
      - MKDOCS_DIR=/mkdocs
